<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Curtis Rebeck – IG Wealth Management</title>
<meta name="description" content="Uncover hidden inefficiencies in your financial strategy. Book a free strategy call with Curtis Rebeck, IG Wealth Management consultant." />

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:    #0b1d2f;
    --bg-mid:     #0f2a45;
    --bg-light:   #132f4c;
    --accent:     #0085CA;
    --accent-lt:  #4fc3ff;
    --accent-hov: #2ea8eb;
    --white:      #ffffff;
    --muted:      rgba(255,255,255,0.45);
    --border:     rgba(255,255,255,0.10);
    --border-md:  rgba(255,255,255,0.20);
    --card:       rgba(255,255,255,0.05);
    --card-hi:    rgba(255,255,255,0.10);
    --amber:      #fbbf24;
    --red:        #f87171;
    --green:      #4ade80;
    --font-body:  'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 50%, var(--bg-light) 100%);
    min-height: 100vh;
    color: var(--white);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px;
  }

  #app {
    width: 100%;
    max-width: 580px;
    text-align: center;
  }

  /* ── PROGRESS BAR ── */
  #progress-wrap {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.10);
    border-radius: 99px;
    margin-bottom: 28px;
    overflow: hidden;
    display: none;
  }
  #progress-bar {
    height: 100%;
    background: var(--white);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* ── STEPS ── */
  .step { animation: fadeUp 0.35s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HERO GLOW ── */
  .hero-glow {
    position: relative;
    margin-bottom: 0;
  }
  .hero-glow::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 120% 320px at 50% 0%, rgba(0,133,202,0.28) 0%, transparent 70%);
    pointer-events: none;
    border-radius: 24px;
    z-index: 0;
  }

  /* ── HERO PANEL ── */
  .hero-panel {
    position: relative;
    z-index: 1;
    background: linear-gradient(180deg, var(--bg-deep) 0%, #071521 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 44px 36px;
    margin-bottom: 20px;
    text-align: center;
  }
  @media (max-width: 480px) { .hero-panel { padding: 32px 20px; } }

  .badge {
    display: inline-block;
    background: rgba(0,133,202,0.20);
    color: var(--accent-lt);
    padding: 5px 16px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 22px;
  }

  h1 {
    font-size: clamp(30px, 6vw, 48px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  .hook {
    color: var(--accent-lt);
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 28px;
    line-height: 1.4;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }

  .benefits {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .benefit-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .check-circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #fff;
    flex-shrink: 0;
  }
  .benefit-row span { font-size: 15px; color: rgba(255,255,255,0.90); }

  .tension { font-size: 13px; color: var(--amber); }

  /* ── CTA ZONE ── */
  .cta-zone {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 24px 0;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 22px 0;
    font-size: 17px;
    font-weight: 600;
    font-family: var(--font-body);
    width: 85%;
    cursor: pointer;
    box-shadow: 0 20px 50px rgba(0,133,202,0.55);
    transition: transform 0.25s ease, background 0.2s;
    text-decoration: none;
    display: inline-block;
    text-align: center;
  }
  .btn-primary:hover { transform: scale(1.04); background: var(--accent-hov); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-white {
    background: #fff;
    color: var(--bg-deep);
    border: none;
    border-radius: 14px;
    padding: 20px 0;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font-body);
    width: 100%;
    cursor: pointer;
    box-shadow: 0 15px 35px rgba(0,0,0,0.35);
    transition: transform 0.2s, background 0.2s, color 0.2s;
  }
  .btn-white:hover { background: var(--accent); color: #fff; transform: scale(1.04); }
  .btn-white:active { transform: scale(0.98); }
  .btn-white:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

  .microcopy {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
  }

  /* ── CONTACT CARD ── */
  .contact-card-wrap {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
  }
  .contact-card {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 28px;
    width: 100%;
    text-align: left;
  }
  .contact-card img {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.15);
  }
  .contact-card .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .contact-card .role { font-size: 13px; color: rgba(255,255,255,0.70); }
  .contact-card .detail { font-size: 13px; color: rgba(255,255,255,0.60); }
  .contact-card .company { font-size: 11px; color: rgba(255,255,255,0.40); margin-top: 4px; }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.20), transparent);
    margin: 36px 0;
  }

  /* ── REVIEWS ── */
  .reviews-label { font-size: 15px; color: var(--accent-lt); font-weight: 500; text-align: left; margin-bottom: 16px; }
  .reviews-wrap { display: flex; flex-direction: column; gap: 16px; margin-bottom: 36px; }
  .review-card {
    border-radius: 14px;
    padding: 22px;
    text-align: left;
    transition: all 0.4s ease;
  }
  .review-card.primary { background: var(--card-hi); border: 1px solid var(--border-md); transform: scale(1.025); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .review-card.secondary { background: var(--card); border: 1px solid var(--border); opacity: 0.80; }
  .stars { color: var(--amber); font-size: 13px; margin-bottom: 8px; }
  .review-text { font-size: 14px; font-style: italic; max-width: 85%; line-height: 1.55; }
  .review-name { font-size: 11px; color: var(--muted); margin-top: 10px; }

  /* ── LOWER SECTION ── */
  .lower-resources {
    background: linear-gradient(180deg, #071521 0%, var(--bg-mid) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 32px;
  }
  .resources-gap { display: flex; flex-direction: column; gap: 16px; }

  /* ── LEAD MAGNET ── */
  .lead-magnet {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .lead-inner { display: flex; gap: 16px; align-items: flex-start; }
  @media (max-width: 420px) { .lead-inner { flex-direction: column; } }
  .lead-thumb { width: 80px; height: 108px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
  .lead-body { flex: 1; text-align: left; }
  .lead-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .lead-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.45; }
  .input-row { display: flex; gap: 8px; }
  .input-sm {
    flex: 1;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 13px;
    font-family: var(--font-body);
    color: #0b1d2f;
    background: #fff;
    outline: none;
  }
  .input-sm::placeholder { color: #9ca3af; }
  .input-sm:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,133,202,0.20); }
  .input-full {
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 13px;
    font-family: var(--font-body);
    color: #0b1d2f;
    background: #fff;
    outline: none;
    margin-bottom: 8px;
    display: block;
  }
  .input-full::placeholder { color: #9ca3af; }
  .input-full:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,133,202,0.20); }
  .btn-sm {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px;
    font-family: var(--font-body);
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .btn-sm:hover { background: #0073b1; }

  /* ── CONSENT ── */
  .consent-wrap {
    border-top: 1px solid rgba(255,255,255,0.10);
    margin-top: 12px;
    padding-top: 12px;
    text-align: left;
  }
  .consent-label { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
  .consent-label input { margin-top: 3px; flex-shrink: 0; accent-color: var(--accent); }
  .consent-text { font-size: 10px; line-height: 1.6; color: var(--muted); }

  /* ── EMAIL BOX ── */
  .email-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    text-align: left;
    margin-bottom: 8px;
  }
  .email-box-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .email-box-desc { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.45; }

  /* ── ERROR / SUCCESS ── */
  .err { font-size: 11px; color: var(--red); margin-top: 6px; }
  .ok  { font-size: 13px; color: var(--green); margin-top: 10px; }

  /* ── QUESTION STEP ── */
  .q-title { font-size: clamp(22px, 5vw, 28px); font-weight: 700; text-align: left; margin-bottom: 8px; }
  .q-sub { font-size: 13px; color: var(--muted); text-align: left; margin-bottom: 28px; }
  .options { display: flex; flex-direction: column; gap: 14px; }
  .option-btn {
    width: 100%;
    background: #fff;
    color: var(--bg-deep);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 15px;
    font-weight: 500;
    font-family: var(--font-body);
    cursor: pointer;
    text-align: left;
    transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .option-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 10px 25px rgba(0,133,202,0.40);
    transform: scale(1.02);
  }
  .option-btn:active { transform: scale(0.98); }

  /* ── CONTACT FORM STEP ── */
  .form-header { margin-bottom: 32px; }
  .form-h2 { font-size: clamp(26px, 5.5vw, 42px); font-weight: 700; line-height: 1.15; margin-bottom: 10px; }
  .form-sub { font-size: 14px; color: var(--muted); max-width: 400px; margin: 0 auto; line-height: 1.5; }
  .form-inputs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .input-lg {
    width: 100%;
    height: 52px;
    padding: 0 16px;
    border-radius: 10px;
    border: 1px solid transparent;
    background: #fff;
    color: var(--bg-deep);
    font-size: 15px;
    font-family: var(--font-body);
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.12);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-lg::placeholder { color: #9ca3af; }
  .input-lg:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,133,202,0.20); }
  .cta-break { border-top: 1px solid rgba(255,255,255,0.10); padding-top: 18px; }

  /* ── RESULTS STEP ── */
  .result-h2 { font-size: clamp(20px, 4.5vw, 28px); font-weight: 700; margin-bottom: 10px; }
  .result-sub { font-size: 17px; color: rgba(255,255,255,0.60); max-width: 400px; margin: 0 auto 24px; }
  .result-items { max-width: 360px; margin: 0 auto 28px; display: flex; flex-direction: column; gap: 10px; }
  .result-item {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    color: rgba(255,255,255,0.90);
    text-align: center;
  }
  .locked-box {
    max-width: 420px;
    margin: 0 auto 28px;
    background: var(--card);
    border: 1px dashed rgba(255,255,255,0.20);
    border-radius: 14px;
    padding: 24px;
    text-align: center;
  }
  .locked-hint { font-size: 13px; color: rgba(255,255,255,0.60); margin-bottom: 12px; }
  .locked-list { font-size: 13px; color: rgba(255,255,255,0.70); line-height: 1.9; filter: blur(4px); user-select: none; }
  .locked-cta { font-size: 13px; color: var(--amber); margin-top: 14px; }

  .book-wrap { text-align: center; margin-bottom: 28px; }
  .book-btn {
    display: inline-block;
    width: 90%;
    max-width: 420px;
    background: var(--accent);
    color: #fff;
    border-radius: 14px;
    padding: 22px 0;
    font-size: 18px;
    font-weight: 600;
    font-family: var(--font-body);
    text-decoration: none;
    box-shadow: 0 25px 60px rgba(0,133,202,0.55);
    transition: background 0.2s, transform 0.25s;
  }
  .book-btn:hover { background: var(--accent-hov); transform: scale(1.03); }
  .book-note { font-size: 12px; color: rgba(255,255,255,0.60); margin-top: 10px; }

  .contact-sm {
    max-width: 420px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    text-align: left;
  }
  .contact-sm img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
  .contact-sm .name { font-size: 14px; font-weight: 600; }
  .contact-sm .role { font-size: 12px; color: rgba(255,255,255,0.70); }
  .contact-sm .detail { font-size: 12px; color: rgba(255,255,255,0.60); }
  .contact-sm .company { font-size: 10px; color: rgba(255,255,255,0.40); margin-top: 3px; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.10);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .footer img { height: 30px; object-fit: contain; }
  .footer-disc { font-size: 10px; color: var(--muted); line-height: 1.6; max-width: 90%; }
  .footer-co { font-size: 11px; color: var(--muted); }
  .footer-links { display: flex; gap: 14px; }
  .footer-links a { font-size: 11px; color: var(--muted); text-decoration: underline; }
  .footer-links a:hover { color: var(--white); }

  /* ── SUB-LABEL ── */
  .sub-label { font-size: 17px; font-weight: 500; text-align: left; margin-bottom: 8px; margin-top: 28px; }
  .sub-note { font-size: 15px; color: var(--muted); text-align: left; margin-bottom: 16px; }
</style>
</head>

/* ─────────────── RENDER ─────────────── */
function render() {
  const view = document.getElementById('view');
  const pw   = document.getElementById('progress-wrap');
  const pb   = document.getElementById('progress-bar');

  // Progress bar
  if (step > 0 && step < 6) {
    pw.style.display = 'block';
    pb.style.width = `${(step / 6) * 100}%`;
  } else {
    pw.style.display = 'none';
  }

  if (step === 0) {
    view.innerHTML = renderHome();
    startReviewTimer();
  } else if (step >= 1 && step <= 5) {
    view.innerHTML = renderQuestion(step - 1);
    stopReviewTimer();
  } else if (step === 6) {
    view.innerHTML = renderForm();
    stopReviewTimer();
    // Restore form values
    ['firstname','lastname','phone','email'].forEach(k => {
      const el = document.getElementById('f-'+k);
      if (el) el.value = formData[k];
    });
    const cb = document.getElementById('f-consent');
    if (cb) cb.checked = consented;
  } else if (step === 7) {
    view.innerHTML = renderResults();
  }
}

      <a href="${BOOKING_URL}" target="_blank" rel="noopener" class="book-btn">Book My Free Strategy Call</a>
      <p class="book-note">Get a personalized plan based on your answers on a quick 10-minute call</p>
    </div>

    <div class="contact-sm">
      <img src="${PROFILE_IMG}" alt="Curtis Rebeck" />
      <div>
        <p class="name">Curtis Rebeck</p>
        <p class="role">Consultant</p>
        <p class="detail">204-981-5109 • curtis.rebeck@ig.ca</p>
        <p class="company">IG Wealth Management Inc. Mutual Fund Division</p>
      </div>
    </div>

    ${footerHTML()}
  </div>`;
}

/* ─────────────── ACTIONS ─────────────── */
function goStep(n) {
  step = n;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function selectAnswer(key, value, next) {
  answers[key] = value;
  goStep(next);
}

function syncForm(key, val) {
  formData[key] = val;
}

function handleContinue() {
  const err = document.getElementById('form-err');
  // Re-read form fields (in case of direct DOM state)
  ['firstname','lastname','phone','email'].forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el) formData[k] = el.value;
  });
  const cb = document.getElementById('f-consent');
  consented = cb ? cb.checked : false;

  if (!formData.firstname || !formData.lastname || !formData.phone || !formData.email) {
    err.textContent = 'Please complete all fields before continuing.'; return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
    err.textContent = 'Please enter a valid email address.'; return;
  }
  if (!consented) {
    err.textContent = 'Please provide consent to continue.'; return;
  }
  err.textContent = '';
  const btn = document.getElementById('submit-btn');
  if (btn) { btn.textContent = 'Submitting…'; btn.disabled = true; }
  // Simulate async (no backend in static site)
  setTimeout(() => goStep(7), 600);
}

function downloadResource(id, pdfUrl, title) {
  const name  = document.getElementById(id+'-name')?.value.trim();
  const email = document.getElementById(id+'-email')?.value.trim();
  const cb    = document.getElementById(id+'-consent');
  const errEl = document.getElementById(id+'-err');

  if (!name)  { errEl.textContent = 'Please enter your name.'; return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address.'; return;
  }
  if (!cb?.checked) { errEl.textContent = 'Please provide your consent to continue.'; return; }
  errEl.textContent = '';
  window.open(pdfUrl, '_blank');
}

function handleSubscribe() {
  const name  = document.getElementById('nl-name')?.value.trim();
  const email = document.getElementById('nl-email')?.value.trim();
  const cb    = document.getElementById('nl-consent');
  const errEl = document.getElementById('nl-err');
  const okEl  = document.getElementById('nl-ok');

  if (!name)  { errEl.textContent = 'Please enter your name.'; return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email.'; return;
  }
  if (!cb?.checked) { errEl.textContent = 'Please provide consent to subscribe.'; return; }
  errEl.textContent = '';
  if (okEl) { okEl.style.display = 'block'; }
  document.getElementById('nl-name').value  = '';
  document.getElementById('nl-email').value = '';
  if (cb) cb.checked = false;
}

/* ─────────────── REVIEW ROTATION ─────────────── */
function startReviewTimer() {
  stopReviewTimer();
  reviewTimer = setInterval(() => {
    reviewIdx = (reviewIdx + 2) % REVIEWS.length;
    const container = document.getElementById('reviews-container');
    if (!container) return;
    const r0 = REVIEWS[reviewIdx % REVIEWS.length];
    const r1 = REVIEWS[(reviewIdx + 1) % REVIEWS.length];
    container.style.opacity = '0';
    container.style.transition = 'opacity 0.3s';
    setTimeout(() => {
      container.innerHTML = `
        <div class="review-card primary">
          <div class="stars">★★★★★</div>
          <p class="review-text">${esc(r0.text)}</p>
          <p class="review-name">${esc(r0.name)}</p>
        </div>
        <div class="review-card secondary">
          <div class="stars">★★★★★</div>
          <p class="review-text">${esc(r1.text)}</p>
          <p class="review-name">${esc(r1.name)}</p>
        </div>`;
      container.style.opacity = '1';
    }, 320);
  }, 5000);
}

function stopReviewTimer() {
  clearInterval(reviewTimer);
}

/* ─────────────── BOOT ─────────────── */
render();
</script>
