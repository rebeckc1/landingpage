<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Strategy</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0b1d2f,#132f4c);
  color:white;
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

button {
  width:100%;
  padding:16px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#0085CA;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover { background:#0073b1; }

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

.center { text-align:center; }
.small { font-size:12px; opacity:.7; }
.error { color:red; }

</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

// ===== STATE =====

let state = {
  step: 0,
  reviewIndex: 0,
  form: {
    firstname:'',
    lastname:'',
    phone:'',
    email:''
  },
  consented:false,
  formError:'',
  answers:{
    annualIncome:'',
    investedSoFar:'',
    challengingArea:'',
    improvePlanTimeline:'',
    livesInCanada:''
  }
};

// ===== DATA =====

const reviews = [
{ name:"Bennett H.", text:"I've had a great experience working with Curtis Rebeck at IG Wealth. He's knowledgeable, easy to talk to, and takes the time to understand your goals before making recommendations. Everything is explained clearly, and he stays in touch regularly." },
{ name:"Tyler V.", text:"Highly recommend if you're looking for a financial advisor in Winnipeg. Curtis was very professional, responsive, and helped put together a clear long-term financial plan." },
{ name:"Brayden K.", text:"Had a great experience working with Curtis. He explained things clearly and helped me build my long-term financial plan." },
{ name:"Liron T.", text:"Curtis is very knowledgeable about investments, insurance and mortgages. I was super impressed after our consultation. He's also willing to pick up the phone and give you advice anytime you need, and for those reasons I highly recommend him for any of your financial needs!" },
{ name:"Ashton H.", text:"Great communication, showed me everything with detail before proceeding with investments. Took the time out of the day to make sure everything was going good and answering all questions I had." },
{ name:"Michael P.", text:"Curtis has been great to work with. He is very knowledgeable, organized, and easy to reach. I've had a great experience and would definitely recommend him." }
];

const questions = [
{ key:"annualIncome", title:"What is your annual household income?", options:["< $100k","$100k - $150k","$150k - $250k","$250k+"] },
{ key:"investedSoFar", title:"How much have you invested so far?", options:["< $100k","$100k - $250k","$250k - $500k","$500k+"] },
{ key:"challengingArea", title:"Which area feels most challenging right now?", options:["Tax efficiency","Long-term growth planning","Confidence in my overall approach","Coordinating multiple moving parts","Not sure - I just want a second opinion"] },
{ key:"improvePlanTimeline", title:"When are you looking to improve your plan?", options:["Immediately","Within the next 3–6 months","Just exploring for now"] },
{ key:"livesInCanada", title:"Do you currently live in Canada?", options:["Yes","No"] }
];

// ===== RENDER =====

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  if(state.step === 0) renderStep0(app);
  if(state.step >=1 && state.step <=5) renderQuestion(app,state.step-1);
  if(state.step === 6) renderForm(app);
  if(state.step === 7) renderResult(app);

  if(state.step === 0 || state.step === 7) renderFooter(app);
}

// ===== STEP 0 =====

function renderStep0(app){

app.innerHTML = `
<div class="card center">
<h1>How Much Could You Be Losing Each Year?</h1>
<p>Hidden inefficiencies in your strategy could be costing you thousands every year.</p>

<ul>
<li>✔ Uncover missed tax-saving opportunities</li>
<li>✔ Ensure your investments are structured properly</li>
<li>✔ Get a clear, optimized financial strategy</li>
</ul>

<p style="color:orange;">Most people only identify these gaps after they’ve already lost money.</p>

<button onclick="setStep(1)">Unlock My Wealth Opportunities</button>

<p class="small">Takes 2 minutes to get started • No commitment required</p>
</div>

<div id="contact" class="card">
<p><strong>Curtis Rebeck</strong></p>
<p>Consultant</p>
<p>204-981-5109</p>
<p>curtis.rebeck@ig.ca</p>
<p class="small">IG Wealth Management Inc.</p>
</div>

<h3>Trusted by professionals, business owners, and families across Winnipeg</h3>

<div id="reviews"></div>

<h3>Resources</h3>
<div id="leadMagnets"></div>

<h3>Email Updates</h3>
<div id="emailBox"></div>
`;

renderReviews();
renderLeadMagnets();
renderEmailBox();

}

// ===== REVIEWS =====

function renderReviews(){
  const container = document.getElementById("reviews");
  container.innerHTML = "";

  for(let i=0;i<2;i++){
    let r = reviews[(state.reviewIndex+i)%reviews.length];

    let div = document.createElement("div");
    div.className="card";
    div.innerHTML = `<strong>${r.name}</strong><p>${r.text}</p>`;

    container.appendChild(div);
  }

  state.reviewIndex = (state.reviewIndex+2)%reviews.length;
  setTimeout(renderReviews,5000);
}

// ===== QUESTIONS =====

function renderQuestion(app,index){
  const q = questions[index];

  let html = `<div class="card"><h2>${q.title}</h2>`;

  q.options.forEach(opt=>{
    html += `<button onclick="selectAnswer('${q.key}','${opt}')">${opt}</button>`;
  });

  html += `</div>`;

  app.innerHTML = html;
}

function selectAnswer(k,v){
  state.answers[k]=v;
  state.step++;
  render();
}

// ===== FORM =====

function renderForm(app){
app.innerHTML = `
<div class="card">

<h2>Unlock Your Personalized Strategy Results</h2>
<p>Enter your details to access your personalized financial strategy overview.</p>

<input placeholder="First name" oninput="state.form.firstname=this.value">
<input placeholder="Last name" oninput="state.form.lastname=this.value">
<input placeholder="Phone" oninput="state.form.phone=this.value">
<input placeholder="Email" oninput="state.form.email=this.value">

<label>
<input type="checkbox" onchange="state.consented=this.checked">
I consent to be contacted
</label>

<p class="error">${state.formError}</p>

<button onclick="submitForm()">See My Personalized Strategy</button>

</div>
`;
}

function submitForm(){

if(!state.form.firstname || !state.form.lastname || !state.form.phone || !state.form.email){
  state.formError="Please complete all fields before continuing.";
  return render();
}

if(!/^[^s@]+@[^s@]+.[^s@]+$/.test(state.form.email)){
  state.formError="Please enter a valid email address.";
  return render();
}

if(!state.consented){
  state.formError="Please provide consent to continue.";
  return render();
}

state.step=7;
render();
}

// ===== RESULT =====

function renderResult(app){

app.innerHTML = `
<div class="card center">

<h2>You’re likely leaving money on the table</h2>

<ul>
<li>Paying more tax than necessary</li>
<li>Investments not structured efficiently</li>
<li>Gaps in long-term strategy</li>
</ul>

<a href="https://outlook.office.com/bookwithme/user/ea9522b929284ffd98a4a4fe683c082b@ig.ca"ook My Free Strategy Call</button>
</a>

<p class="small">Get a personalized plan based on your answers</p>

</div>
`;
}

// ===== LEAD MAGNET =====

function renderLeadMagnets(){

const container = document.getElementById("leadMagnets");

["Retirement Guide","Financial Organizer"].forEach(id=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML = `
<p>${id}</p>
<input placeholder="Name" id="${id}-n">
<input placeholder="Email" id="${id}-e">
<label><input type="checkbox" id="${id}-c"> Consent</label>
<button onclick="download('${id}')">Download</button>
`;

container.appendChild(div);
});
}

function download(id){
let n=document.getElementById(id+"-n").value;
let e=document.getElementById(id+"-e").value;
let c=document.getElementById(id+"-c").checked;

if(!n||!e||!c) return alert("Complete fields");

window.open("https://images.fillout.com","_blank");
}

// ===== EMAIL =====

function renderEmailBox(){
const c = document.getElementById("emailBox");

c.innerHTML = `
<div class="card">

<input id="subn" placeholder="Name">
<input id="sube" placeholder="Email">
<label><input id="subc" type="checkbox"> Consent</label>

<button onclick="subscribe()">Subscribe</button>

<p id="msg"></p>

</div>
`;
}

function subscribe(){
let n=document.getElementById("subn").value;
let e=document.getElementById("sube").value;
let c=document.getElementById("subc").checked;

if(!n||!e||!c){
  document.getElementById("msg").innerText="Error";
  return;
}

document.getElementById("msg").innerText="✅ You're subscribed!";
}

// ===== FOOTER =====

function renderFooter(app){

app.innerHTML += `
<div class="center small">
<p>IG Wealth Management Inc. Mutual Fund Division</p>

<a href="https://www.investorsgroup.com/en/legal/disclosures" target
<a href="https://www.investorsgroup.com/en/legal/disclosures" target="_ref="https://www.ig.ca/en/advisor/curtis_rebeck" target="_`;
}

// ===== CONTROL =====

function setStep(s){
state.step=s;
render();
}

// ===== INIT =====
render();

</script>

</body>
</html>
