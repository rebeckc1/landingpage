<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Strategy</title>

<style>

/* ========================== */
/* GLOBAL */
/* ========================== */

body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#0b1d2f,#0f2a45,#132f4c);
    color: white;
}

#app {
    max-width: 760px;
    margin: auto;
    padding: 20px;
}

/* ========================== */
/* LAYOUT */
/* ========================== */

.section {
    margin-bottom: 24px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 16px;
}

.center {
    text-align: center;
}

.stack {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.row {
    display: flex;
    gap: 12px;
    align-items: center;
}

/* ========================== */
/* TEXT */
/* ========================== */

h1 { font-size: 42px; }
h2 { font-size: 26px; }
h3 { font-size: 20px; }

.small {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
}

.error {
    color: #ff6666;
}

/* ========================== */
/* BUTTON */
/* ========================== */

button {
    width: 100%;
    padding: 16px;
    background: #0085CA;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

/* ========================== */
/* INPUT */
/* ========================== */

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

/* ========================== */
/* PROGRESS */
/* ========================== */

.progress-wrap {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 100px;
    margin-bottom: 14px;
}

.progress-bar {
    height: 6px;
    background: white;
}

/* ========================== */
/* REVIEW */
/* ========================== */

.review {
    padding: 16px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
}

/* ========================== */
/* FOOTER */
/* ========================== */

.footer {
    margin-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 20px;
    text-align: center;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* ========================================================= */
/* STATE */
/* ========================================================= */

const state = {
    step: 0,
    reviewIndex: 0,
    answers: {
        annualIncome: '',
        investedSoFar: '',
        challengingArea: '',
        improvePlanTimeline: '',
        livesInCanada: ''
    },
    form: {
        firstname: '',
        lastname: '',
        phone: '',
        email: ''
    },
    consented: false,
    formError: '',
    email: {
        name: '',
        email: '',
        consent: false,
        error: '',
        success: false
    }
};

/* ========================================================= */
/* CONSTANTS */
/* ========================================================= */

const BOOKING_URL =
'https://outlook.office.com/bookwithme/user/ea9522b929284ffd98a4a4fe683c082b@ig.ca?anonymous&ep=plink';

const DISCLOSURE_URL =
'https://www.investorsgroup.com/en/legal/disclosures';

const WEBPAGE_URL =
'https://www.ig.ca/en/advisor/curtis_rebeck';

const TRADEMARK_URL =
'https://www.investorsgroup.com/en/legal/disclosures';

/* ========================================================= */
/* CONSENT */
/* ========================================================= */

const CONSENT_TEXT = `By providing my telephone number and/or email address above, I CONSENT to IG Wealth Management using this information to contact me for marketing purposes. I can withdraw my consent at any time by following the unsubscribe instructions in any marketing emails I receive from IG Wealth Management. We are committed to keeping personal information confidential. The information collected above may be used by IG Wealth Management and shared with its affiliates to inform you on investment opportunities, provide additional financial information from time to time, and for other internal purposes.`;

/* ========================================================= */
/* REVIEWS */
/* ========================================================= */

const reviews = [
{ name:"Bennett H.", text:"I've had a great experience working with Curtis Rebeck at IG Wealth. He's knowledgeable, easy to talk to, and takes the time to understand your goals before making recommendations. Everything is explained clearly, and he stays in touch regularly." },
{ name:"Tyler V.", text:"Highly recommend if you're looking for a financial advisor in Winnipeg. Curtis was very professional, responsive, and helped put together a clear long-term financial plan." },
{ name:"Brayden K.", text:"Had a great experience working with Curtis. He explained things clearly and helped me build my long-term financial plan." },
{ name:"Liron T.", text:"Curtis is very knowledgeable about investments, insurance and mortgages. I was super impressed after our consultation. He's also willing to pick up the phone and give you advice anytime you need, and for those reasons I highly recommend him for any of your financial needs!" },
{ name:"Ashton H.", text:"Great communication, showed me everything with detail before proceeding with investments. Took the time out of the day to make sure everything was going good and answering all questions I had." },
{ name:"Michael P.", text:"Curtis has been great to work with. He is very knowledgeable, organized, and easy to reach. I've had a great experience and would definitely recommend him." }
];

/* ========================================================= */
/* QUESTIONS */
/* ========================================================= */

const questions = [
{
key:"annualIncome",
title:"What is your annual household income?",
options:["< $100k","$100k - $150k","$150k - $250k","$250k+"]
},
{
key:"investedSoFar",
title:"How much have you invested so far?",
options:["< $100k","$100k - $250k","$250k - $500k","$500k+"]
},
{
key:"challengingArea",
title:"Which area feels most challenging right now?",
options:[
"Tax efficiency",
"Long-term growth planning",
"Confidence in my overall approach",
"Coordinating multiple moving parts",
"Not sure - I just want a second opinion"
]
},
{
key:"improvePlanTimeline",
title:"When are you looking to improve your plan?",
options:[
"Immediately",
"Within the next 3–6 months",
"Just exploring for now"
]
},
{
key:"livesInCanada",
title:"Do you currently live in Canada?",
options:["Yes","No"]
}
];

/* ========================================================= */
/* RENDER */
/* ========================================================= */

function render(){

    const app = document.getElementById('app');
    app.innerHTML = '';

    renderProgress(app);

    if(state.step === 0){
        renderStep0(app);
    }

    if(state.step >=1 && state.step <=5){
        renderQuestions(app);
    }

    if(state.step === 6){
        renderForm(app);
    }

    if(state.step === 7){
        renderResult(app);
    }

    if(state.step === 0 || state.step === 7){
        renderFooter(app);
    }
}

/* ========================================================= */
/* PROGRESS */
/* ========================================================= */

function renderProgress(app){

    if(state.step <= 0 || state.step >= 6){
        return;
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'progress-wrap';

    const bar = document.createElement('div');
    bar.className = 'progress-bar';

    const percent = (state.step / 6) * 100;
    bar.style.width = percent + '%';

    wrapper.appendChild(bar);
    app.appendChild(wrapper);
}

/* ========================================================= */
/* STEP CONTROL */
/* ========================================================= */

function setStep(s){
    state.step = s;
    render();
}

/* ========================================================= */
/* STEP 0 */
/* ========================================================= */

function renderStep0(app){

    const hero = document.createElement('div');
    hero.className = 'card center section';

    hero.innerHTML =
    '<div class="small">Trusted by 350+ professionals</div>' +
    '<h1>How Much Could You Be Losing Each Year?</h1>' +
    '<p>Hidden inefficiencies in your strategy could be costing you thousands every year.</p>' +
    '<div>✔ Tax-saving opportunities</div>' +
    '<div>✔ Better structure</div>' +
    '<div>✔ Optimized strategy</div>' +
    '<p class="small">Most people only identify these gaps after they’ve already lost money.</p>';

    app.appendChild(hero);

    const cta = document.createElement('div');
    cta.className = 'card center section';

    const btn = document.createElement('button');
    btn.innerText = 'Unlock My Wealth Opportunities';
    btn.onclick = function(){
        setStep(1);
    };

    cta.appendChild(btn);

    const micro = document.createElement('div');
    micro.className = 'small';
    micro.innerText = 'Takes 2 minutes • No commitment';

    cta.appendChild(micro);

    app.appendChild(cta);

    renderContact(app);
    renderReviewsBlock(app);
    renderResources(app);
    renderEmailBox(app);
}

/* ========================================================= */
/* CONTACT */
/* ========================================================= */

function renderContact(app){

    const card = document.createElement('div');
    card.className = 'card row section';

    const img = document.createElement('img');
    img.src = 'https://images.fillout.com/orgid-709482/flowpublicid-k8tpxt55fg/widgetid-default/urPEstKdyvJmFYefFqaXGz/pasted-image-1780269414006-cdogar7g.png';
    img.style.width = '80px';

    const info = document.createElement('div');

    info.innerHTML =
    '<b>Curtis Rebeck</b>' +
    '<div>Consultant</div>' +
    '<div>204-981-5109</div>' +
    '<div>curtis.rebeck@ig.ca</div>' +
    '<div class="small">IG Wealth Management Inc.</div>' +
    '<div class="small">Mutual Fund Division</div>';

    card.appendChild(img);
    card.appendChild(info);

    app.appendChild(card);
}

/* ========================================================= */
/* REVIEWS */
/* ========================================================= */

function renderReviewsBlock(app){

    const title = document.createElement('h3');
    title.innerText = 'Trusted across Winnipeg';
    app.appendChild(title);

    const container = document.createElement('div');
    container.id = 'reviews';
    app.appendChild(container);

    rotateReviews();
}

function rotateReviews(){

    const container = document.getElementById('reviews');

    if(!container){ return; }

    container.innerHTML = '';

    const r1 = reviews[state.reviewIndex % reviews.length];
    const r2 = reviews[(state.reviewIndex + 1) % reviews.length];

    const div1 = document.createElement('div');
    div1.className = 'review';
    div1.innerHTML = r1.text + '<div>' + r1.name + '</div>';

    const div2 = document.createElement('div');
    div2.className = 'review';
    div2.innerHTML = r2.text + '<div>' + r2.name + '</div>';

    container.appendChild(div1);
    container.appendChild(div2);

    state.reviewIndex += 2;

    setTimeout(rotateReviews, 5000);
}

/* ========================================================= */
/* QUESTIONS */
/* ========================================================= */

function renderQuestions(app){

    const q = questions[state.step - 1];

    const card = document.createElement('div');
    card.className = 'card center';

    const title = document.createElement('h2');
    title.innerText = q.title;

    card.appendChild(title);

    const subtitle = document.createElement('div');
    subtitle.className = 'small';
    subtitle.innerText = 'Choose the option that best matches your situation';

    card.appendChild(subtitle);

    for(let i = 0; i < q.options.length; i++){

        const btn = document.createElement('button');
        btn.innerText = q.options[i];

        btn.onclick = function(){
            state.answers[q.key] = q.options[i];
            state.step = state.step + 1;
            render();
        };

        card.appendChild(btn);
    }

    app.appendChild(card);
}

/* ========================================================= */
/* FORM */
/* ========================================================= */

function renderForm(app){

    const card = document.createElement('div');
    card.className = 'card';

    const title = document.createElement('h2');
    title.innerText = 'Enter details';

    card.appendChild(title);

    const input1 = document.createElement('input');
    input1.placeholder = 'First name';
    input1.oninput = function(e){
        state.form.firstname = e.target.value;
    };

    card.appendChild(input1);

    const input2 = document.createElement('input');
    input2.placeholder = 'Last name';
    input2.oninput = function(e){
        state.form.lastname = e.target.value;
    };

    card.appendChild(input2);

    const input3 = document.createElement('input');
    input3.placeholder = 'Phone';
    input3.oninput = function(e){
        state.form.phone = e.target.value;
    };

    card.appendChild(input3);

    const input4 = document.createElement('input');
    input4.placeholder = 'Email';
    input4.oninput = function(e){
        state.form.email = e.target.value;
    };

    card.appendChild(input4);

    const consent = document.createElement('div');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';

    checkbox.onchange = function(e){
        state.consented = e.target.checked;
    };

    const span = document.createElement('span');
    span.className = 'small';
    span.innerText = CONSENT_TEXT;

    consent.appendChild(checkbox);
    consent.appendChild(span);

    card.appendChild(consent);

    const error = document.createElement('div');
    error.className = 'error';
    error.innerText = state.formError;

    card.appendChild(error);

    const btn = document.createElement('button');
    btn.innerText = 'Continue';

    btn.onclick = function(){
        submitForm();
    };

    card.appendChild(btn);

    app.appendChild(card);
}

function submitForm(){

    if(!state.form.firstname || !state.form.lastname || !state.form.phone || !state.form.email){
        state.formError = 'Fill all fields';
        render();
        return;
    }

    if(!state.consented){
        state.formError = 'Consent required';
        render();
        return;
    }

    state.step = 7;
    render();
}

/* ========================================================= */
/* RESOURCES */
/* ========================================================= */

function renderResources(app){

    const title = document.createElement('h3');
    title.innerText = 'Resources';
    app.appendChild(title);

    for(let i=0;i<2;i++){

        const card = document.createElement('div');
        card.className = 'card';

        const input1 = document.createElement('input');
        input1.placeholder = 'Name';

        const input2 = document.createElement('input');
        input2.placeholder = 'Email';

        const check = document.createElement('input');
        check.type = 'checkbox';

        const btn = document.createElement('button');
        btn.innerText = 'Download';

        card.appendChild(input1);
        card.appendChild(input2);
        card.appendChild(check);
        card.appendChild(btn);

        app.appendChild(card);
    }
}

/* ========================================================= */
/* EMAIL */
/* ========================================================= */

function renderEmailBox(app){

    const title = document.createElement('h3');
    title.innerText = 'Subscribe';
    app.appendChild(title);

    const card = document.createElement('div');
    card.className = 'card';

    const name = document.createElement('input');
    name.placeholder = 'Name';

    name.oninput = function(e){
        state.email.name = e.target.value;
    };

    card.appendChild(name);

    const email = document.createElement('input');
    email.placeholder = 'Email';

    email.oninput = function(e){
        state.email.email = e.target.value;
    };

    card.appendChild(email);

    const check = document.createElement('input');
    check.type = 'checkbox';

    check.onchange = function(e){
        state.email.consent = e.target.checked;
    };

    card.appendChild(check);

    const error = document.createElement('div');
    error.className = 'error';
    error.innerText = state.email.error;

    card.appendChild(error);

    const btn = document.createElement('button');
    btn.innerText = 'Subscribe';

    btn.onclick = function(){
        subscribe();
    };

    card.appendChild(btn);

    app.appendChild(card);
}

function subscribe(){

    if(!state.email.name){
        state.email.error = 'Name required';
        render();
        return;
    }

    if(!state.email.consent){
        state.email.error = 'Consent required';
        render();
        return;
    }

    state.email.error = '';
    state.email.success = true;
    render();
}

/* ========================================================= */
/* RESULT */
/* ========================================================= */

function renderResult(app){

    const card = document.createElement('div');
    card.className = 'card center';

    card.innerHTML =
    '<h2>You’re likely leaving money</h2>' +
    '<div>Tax inefficiency</div>' +
    '<div>Investment gaps</div>' +
    '<div>Planning gaps</div>';

    const link = document.createElement('a');
    link.href = BOOKING_URL;
    link.target = '_blank';

    const btn = document.createElement('button');
    btn.innerText = 'Book Call';

    link.appendChild(btn);
    card.appendChild(link);

    app.appendChild(card);
}

/* ========================================================= */
/* FOOTER */
/* ========================================================= */

function renderFooter(app){

    const div = document.createElement('div');
    div.className = 'footer small';

    div.innerHTML =
    '<p>Informational purposes only</p>' +
    '<div>IG Wealth Management Inc.</div>' +
    '<a href="'+DISCLOSURE_URL+'" target="_blank">Disclosures</a> | ' +
    '<a href="'+TRADEMARK_URL+'" target="_blank">Trademark</a> | ' +
    '<a href="'+WEBPAGE_URL+'" target="_blank">Webpage</a>';

    app.appendChild(div);
}

/* ========================================================= */
/* INIT */
/* ========================================================= */

render();

</script>

</body>
</html>
